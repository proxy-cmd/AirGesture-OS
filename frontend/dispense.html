<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Astera Bank | Dispense Mode</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body data-screen="dispense">
  <div class="bg-cream"></div>
  <div class="grain"></div>

  <main class="app-shell">
    <header class="top-bar reveal-up">
      <div class="brand-inline">
        <div class="crest">AB</div>
        <div>
          <p class="bank-title">Astera Bank</p>
          <p class="bank-sub">Dispense Console</p>
        </div>
      </div>
      <a class="secondary-btn" href="./index.html">Back to Role Select</a>
    </header>

    <section class="panel panel-grid reveal-up delay-1">
      <div class="card qr-card">
        <h2>Scan To Pay</h2>
        <p class="muted">Receiver ID: <span id="receiverId">machine_001</span></p>
        <div id="qrcode" class="qr-box" aria-label="Payment QR"></div>
      </div>

      <div class="card status-card">
        <h2>Machine Status</h2>
        <p id="statusText" class="status-text">Waiting for payment...</p>
        <p class="balance-row">Machine Balance: <span id="machineBalance">&#8377;0</span></p>

        <div id="cashStage" class="cash-stage hidden" aria-hidden="true">
          <div class="note note-a">&#8377;10</div>
          <div class="note note-b">&#8377;10</div>
          <div class="note note-c">&#8377;20</div>
          <div class="cash-slot"></div>
          <div class="slot-glow"></div>
        </div>
      </div>
    </section>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="./app.js"></script>
</body>
</html>
